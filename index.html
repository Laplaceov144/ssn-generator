<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>SSN Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        input,
        button {
            padding: 8px;
            font-size: 16px;
            margin-top: 10px;
        }

        #output {
            margin-top: 20px;
            white-space: pre-line;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <h2>SSN Generator</h2>

    <label for="count">SSN numbers count:</label><br>
    <input type="number" id="count" value="5" min="1">
    <br>
    <button onclick="generateSSN()">Generate</button>

    <div id="output"></div>

    <script>
        function generateSSN() {
            const count = parseInt(document.getElementById("count").value);
            const output = document.getElementById("output");
            output.innerHTML = "";

            for (let i = 0; i < count; i++) {
                let result = "";

                // pierwsza cyfra (0–8, bez 9)
                result += Math.floor(Math.random() * 9);

                // pozostałe 8 cyfr (0–9)
                for (let j = 1; j < 9; j++) {
                    result += Math.floor(Math.random() * 10);
                }

                result = result.slice(0, 3) + "-" +
                    result.slice(3, 5) + "-" +
                    result.slice(5, 9);

                output.innerHTML += result + "\n";
            }
        }
    </script>

</body>

</html>
